<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200' width='200' height='200'>
  <defs>
    <clipPath id='circ'><circle cx='100' cy='100' r='100'/></clipPath>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#e8f0fe'/>
      <stop offset='1' stop-color='#c7d9f8'/>
    </linearGradient>
    <linearGradient id='suit' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#3a4a6b'/>
      <stop offset='1' stop-color='#2a3655'/>
    </linearGradient>
    <linearGradient id='skin' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#f9d8b8'/>
      <stop offset='1' stop-color='#f0c49a'/>
    </linearGradient>
  </defs>
  <g clip-path='url(#circ)'>
    <rect width='200' height='200' fill='url(#bg)'/>
    <!-- body / suit -->
    <ellipse cx='100' cy='185' rx='70' ry='55' fill='url(#suit)'/>
    <rect x='60' y='138' width='80' height='62' fill='url(#suit)'/>
    <!-- shirt / collar -->
    <polygon points='100,138 85,160 100,158 115,160' fill='#ffffff'/>
    <!-- blue tie / scarf -->
    <polygon points='92,140 100,136 108,140 103,162 97,162' fill='#2563eb'/>
    <!-- neck -->
    <rect x='88' y='122' width='24' height='20' rx='6' fill='url(#skin)'/>
    <!-- head -->
    <ellipse cx='100' cy='105' rx='38' ry='42' fill='url(#skin)'/>
    <!-- hair - back -->
    <ellipse cx='100' cy='80' rx='40' ry='36' fill='#2d1a0e'/>
    <!-- face details -->
    <!-- eyebrows -->
    <path d='M82 92 Q88 88 94 91' stroke='#4a2e0a' stroke-width='2.2' fill='none' stroke-linecap='round'/>
    <path d='M106 91 Q112 88 118 92' stroke='#4a2e0a' stroke-width='2.2' fill='none' stroke-linecap='round'/>
    <!-- eyes -->
    <ellipse cx='88' cy='98' rx='7' ry='5.5' fill='white'/>
    <ellipse cx='112' cy='98' rx='7' ry='5.5' fill='white'/>
    <circle cx='89' cy='99' r='4' fill='#3d2010'/>
    <circle cx='113' cy='99' r='4' fill='#3d2010'/>
    <circle cx='90.5' cy='97.5' r='1.3' fill='white'/>
    <circle cx='114.5' cy='97.5' r='1.3' fill='white'/>
    <!-- nose -->
    <path d='M98 106 Q100 112 102 106' stroke='#c8906a' stroke-width='1.3' fill='none' stroke-linecap='round'/>
    <!-- smile -->
    <path d='M88 116 Q100 124 112 116' stroke='#c0392b' stroke-width='2' fill='none' stroke-linecap='round'/>
    <!-- cheeks -->
    <ellipse cx='82' cy='112' rx='8' ry='5' fill='rgba(220,100,80,0.18)'/>
    <ellipse cx='118' cy='112' rx='8' ry='5' fill='rgba(220,100,80,0.18)'/>
    <!-- hair - front/top -->
    <path d='M62 95 Q64 60 100 60 Q136 60 138 95 Q132 72 100 70 Q68 72 62 95Z' fill='#2d1a0e'/>
    <!-- ear -->
    <ellipse cx='62' cy='105' rx='6' ry='8' fill='url(#skin)'/>
    <ellipse cx='138' cy='105' rx='6' ry='8' fill='url(#skin)'/>
    <!-- earring -->
    <circle cx='62' cy='112' r='2.5' fill='#f0c040'/>
    <circle cx='138' cy='112' r='2.5' fill='#f0c040'/>
  </g>
  <!-- gold ring border -->
  <circle cx='100' cy='100' r='98' fill='none' stroke='#f0c040' stroke-width='4'/>
</svg>