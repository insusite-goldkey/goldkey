name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT: gen-lang-client-0777682955
  REGION: asia-northeast3
  SERVICE: goldkey-ai
  REPO: goldkey

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '>= 363.0.0'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository (if not exists)
        run: |
          gcloud artifacts repositories describe ${{ env.REPO }} \
            --location=${{ env.REGION }} --project=${{ env.GCP_PROJECT }} \
            --quiet 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.GCP_PROJECT }} \
            --quiet

      - name: Build and Push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          # [GP-FIX] 구분자를 ^|^ (파이프) 으로 설정 — 콤마(URL포함)/콜론(https:) 충돌 방지
          SEP="|"
          ENVVARS="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}GOOGLE_API_KEY=${{ secrets.GEMINI_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}HQ_APP_URL=https://goldkey-ai-vje5ef5qka-du.a.run.app"
          ENVVARS="${ENVVARS}${SEP}CRM_APP_URL=https://goldkey-crm-vje5ef5qka-du.a.run.app"
          ENVVARS="${ENVVARS}${SEP}SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
          ENVVARS="${ENVVARS}${SEP}SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          ENVVARS="${ENVVARS}${SEP}HEAD_API_USER_ID=ADMIN_MASTER"
          ENVVARS="${ENVVARS}${SEP}HEAD_API_URL=http://127.0.0.1:18080"
          ENVVARS="${ENVVARS}${SEP}CORS_ALLOW_ORIGINS=http://localhost:8501"
          ENVVARS="${ENVVARS}${SEP}ADMIN_CODE=${{ secrets.ADMIN_CODE }}"
          ENVVARS="${ENVVARS}${SEP}MASTER_CODE=${{ secrets.MASTER_CODE }}"
          ENVVARS="${ENVVARS}${SEP}ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
          ENVVARS="${ENVVARS}${SEP}GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}"
          ENVVARS="${ENVVARS}${SEP}FINLIFE_API_KEY=${{ secrets.FINLIFE_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}KAKAO_REDIRECT_URI=https://goldkey-ai-vje5ef5qka-du.a.run.app/"
          ENVVARS="${ENVVARS}${SEP}KAKAO_API_KEY=${{ secrets.KAKAO_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}KAKAO_SENDER_KEY=${{ secrets.KAKAO_SENDER_KEY }}"
          ENVVARS="${ENVVARS}${SEP}KAKAO_TEMPLATE_ID=goldkey_report_v1"
          ENVVARS="${ENVVARS}${SEP}SMS_API_KEY=${{ secrets.SMS_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}SMS_API_SECRET=${{ secrets.SMS_API_SECRET }}"
          ENVVARS="${ENVVARS}${SEP}SMS_SENDER_NUM=${{ secrets.SMS_SENDER_NUM }}"
          ENVVARS="${ENVVARS}${SEP}HIRA_API_KEY=${{ secrets.HIRA_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}KOSIS_API_KEY=${{ secrets.KOSIS_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}ONC_API_KEY=${{ secrets.ONC_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}FSS_API_KEY=${{ secrets.FSS_API_KEY }}"
          ENVVARS="${ENVVARS}${SEP}ADMIN_KEY=${{ secrets.ADMIN_KEY }}"
          ENVVARS="${ENVVARS}${SEP}GCS_CACHE_BUCKET=${{ secrets.GCS_CACHE_BUCKET }}"
          ENVVARS="${ENVVARS}${SEP}ADMIN_NOTIFY_PHONE=${{ secrets.ADMIN_NOTIFY_PHONE }}"
          ENVVARS="${ENVVARS}${SEP}MS_CLIENT_ID=${{ secrets.MS_CLIENT_ID }}"
          ENVVARS="${ENVVARS}${SEP}MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }}"
          ENVVARS="${ENVVARS}${SEP}MS_TENANT_ID=common"
          ENVVARS="${ENVVARS}${SEP}MS_REDIRECT_URI=${{ secrets.MS_REDIRECT_URI }}"
          ENVVARS="${ENVVARS}${SEP}GK_ANALYSIS_BRIDGE_SECRET=${{ secrets.GK_ANALYSIS_BRIDGE_SECRET }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 80 \
            --min-instances 1 \
            --max-instances 3 \
            --port 8080 \
            --timeout 300 \
            --session-affinity \
            --set-env-vars "^|^${ENVVARS}" \
            --service-account "817097913199-compute@developer.gserviceaccount.com" \
            --project ${{ env.GCP_PROJECT }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --format="value(status.url)"
