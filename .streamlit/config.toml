[global]
developmentMode = false

[logger]
level = "info"
messageFormat = "%(asctime)s %(levelname)s %(name)s: %(message)s"

[server]
headless = true
address = "0.0.0.0"
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
serverPort = 8080

[theme]
primaryColor = "#FFD700"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F7FF"
textColor = "#1A1A1A"
font = "sans serif"
